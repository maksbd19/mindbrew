# Literature-informed wax ester scenario for iYLI647.
# Calibrate exchange_constraints and max_growth_rate from your target paper/experiment.

name: wax_ester_oleate_n_limited
description: >
  Nitrogen-limited lipid-accumulation mode on oleate. Minimal medium closes
  side-door carbon exchanges (e.g. glucose) so oleate is the sole carbon import.

literature_refs:
  - "Mishra et al. 2018 BMC Syst Biol - iYLI647 model, N vs C limited biomass equations"
  - "Iowa State WE work - Y. lipolytica N-limited medium with oleic/WCO feed"
  - "Xu et al. 2016 - FAEE production context (related, lower titers)"

# No wax-ester flux/titer benchmark on iYLI647 — product flux stays unvalidated
# until experimental WE data are added here.
product_literature_refs: []

biomass_rxn: BIOMASS_yarrowia_nitrogen_limiting
carbon_source_rxn: EX_ocdcea_LPAREN_e_RPAREN_
carbon_source_uptake: 10.0
use_minimal_medium: true
substrate_moles_per_product: 2.0

# Minimal-medium cofeeds + low N. All other carbon exchanges closed (no glucose side door).
exchange_constraints:
  EX_co2_LPAREN_e_RPAREN_: [0.0, 1000.0]
  EX_o2_LPAREN_e_RPAREN_: [-1000.0, 0.0]
  EX_nh4_LPAREN_e_RPAREN_: [-1.0, 0.0]
  EX_h2o_LPAREN_e_RPAREN_: [-1000.0, 1000.0]
  EX_h_LPAREN_e_RPAREN_: [-1000.0, 1000.0]
  EX_pi_LPAREN_e_RPAREN_: [-10.0, 0.0]
  EX_so4_LPAREN_e_RPAREN_: [-10.0, 0.0]
  EX_k_LPAREN_e_RPAREN_: [-10.0, 0.0]
  EX_na1_LPAREN_e_RPAREN_: [-10.0, 0.0]

knockouts:
  - ACOAO4p
  - ACOAO5p
  - ACOAO7p
  - ACOAO8p
  - ACOAO9p
  # Optional: block TAG remobilization (resolve ids via find_ids.py):
  # - LRO1_ps
  # - TGL3

min_growth_rate: 0.01
max_growth_rate: 0.15

simulation_notes:
  - "use_minimal_medium=true closes EX_glc and other carbon side doors."
  - "Check carbon_audit.feedstock_is_sole_carbon_source in score_pathway output."
  - "confidence_level medium_calibrated = growth/medium pinned, product flux NOT validated."
  - "Report yield_corrected_mol_per_mol_substrate (not raw yield) to agents."
