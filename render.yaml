# Render Blueprint — https://render.com/docs/blueprint-spec
databases:
  - name: brewmind-db
    plan: free
    databaseName: brewmind

services:
  - type: web
    name: brewmind-api
    runtime: python
    plan: free
    buildCommand: |
      git submodule update --init --recursive vendor/FBA_Analysis
      pip install -r requirements.txt
    releaseCommand: alembic upgrade head
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: brewmind-db
          property: connectionString
      - key: NEBIUS_API_KEY
        sync: false
      - key: NEBIUS_MODEL
        sync: false
      - key: NEBIUS_BASE_URL
        sync: false
      - key: BREWMIND_OFFLINE
        value: "false"
      - key: MAX_REVISIONS
        value: "5"
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: brewmind-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: brewmind-web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: API_URL
        fromService:
          type: web
          name: brewmind-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: brewmind-api
          envVarKey: RENDER_EXTERNAL_URL
